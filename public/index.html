<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatgram</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Scrollbar styling */
    #chat::-webkit-scrollbar {
      width: 4px;
    }
    #chat::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white h-screen flex flex-col">

  <!-- Header -->
  <div class="p-4 text-center text-lg font-semibold backdrop-blur-md bg-white/10 border-b border-white/10">
    Private Chat
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto px-3 py-4 space-y-3"></div>

  <!-- Input Bar -->
  <div class="p-3 backdrop-blur-lg bg-white/10 border-t border-white/10">
    <div class="flex items-center gap-2 bg-white/10 rounded-full px-3 py-2">

      <input 
        id="msg"
        type="text"
        placeholder="Message..."
        class="flex-1 bg-transparent outline-none text-white placeholder-gray-400"
      />

      <button 
        onclick="sendMessage()"
        class="bg-gradient-to-r from-blue-500 to-purple-500 p-2 rounded-full hover:scale-105 transition"
      >
        ➤
      </button>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
