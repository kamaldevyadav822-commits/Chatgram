<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatgram</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white h-screen flex flex-col">

<!-- LOGIN -->
<div id="loginScreen" class="flex flex-col justify-center items-center h-screen gap-4">
  <h1 class="text-2xl font-bold">Private Chat</h1>

  <input id="email" placeholder="Email"
    class="px-4 py-2 rounded bg-white/10 border border-white/20 outline-none">

  <input id="password" type="password" placeholder="Password"
    class="px-4 py-2 rounded bg-white/10 border border-white/20 outline-none">

  <button onclick="login()"
    class="bg-blue-500 px-6 py-2 rounded hover:scale-105 transition">
    Login
  </button>
</div>

<!-- CHAT -->
<div id="chatScreen" class="hidden flex flex-col h-screen">

  <!-- HEADER -->
  <div class="p-3 border-b border-white/10 flex justify-between items-center">

    <div>
      <div class="font-semibold">Private Chat</div>
      <div id="status" class="text-xs text-gray-400">Offline</div>
    </div>

    <!-- AVATAR -->
    <div class="relative">
      <div id="avatar"
        class="w-9 h-9 rounded-full bg-blue-500 flex items-center justify-center cursor-pointer font-semibold">
        U
      </div>

      <div id="menu"
        class="hidden absolute right-0 mt-2 w-40 bg-black/80 backdrop-blur-md border border-white/10 rounded-lg p-2">

        <div id="nicknameDisplay" class="text-sm px-2 py-1 text-gray-300"></div>

        <button onclick="logout()"
          class="w-full text-left px-2 py-1 text-red-400 hover:bg-white/10 rounded">
          Logout
        </button>
      </div>
    </div>

  </div>

  <!-- CHAT -->
  <div id="chat" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

  <!-- TYPING -->
  <div id="typing" class="text-xs text-gray-400 px-3 hidden">
    typing...
  </div>

  <!-- INPUT -->
  <div class="p-3 border-t border-white/10 flex gap-2">
    <input id="msg" placeholder="Message..."
      class="flex-1 px-4 py-2 rounded-full bg-white/10 outline-none">

    <button id="sendBtn"
      onclick="sendMessage()"
      class="bg-blue-500 px-4 py-2 rounded-full transition active:scale-90">
      ➤
    </button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
