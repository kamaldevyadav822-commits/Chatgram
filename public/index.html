<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white">

<!-- LOGIN -->
<div id="loginScreen" class="flex items-center justify-center h-screen">
  <div class="w-[90%] max-w-sm p-6 bg-white/10 rounded-xl">

    <input id="email" placeholder="Email"
      class="w-full mb-3 p-3 bg-white/10 rounded outline-none">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-3 p-3 bg-white/10 rounded outline-none">

    <button onclick="login()"
      class="w-full bg-blue-500 py-2 rounded">
      Login
    </button>

  </div>
</div>

<!-- CHAT LIST -->
<div id="chatList" class="hidden h-screen flex flex-col">

  <div class="p-4 border-b border-white/10 flex justify-between items-center">
    <h2>Chats</h2>

    <div class="relative">
      <div id="avatar"
        class="w-9 h-9 rounded-full bg-blue-500 flex items-center justify-center cursor-pointer">
        U
      </div>

      <div id="menu"
        class="hidden absolute right-0 mt-2 w-40 bg-black/90 border border-white/10 rounded-lg p-2">

        <button onclick="logout()"
          class="w-full text-left p-2 text-red-400">
          Logout
        </button>

      </div>
    </div>
  </div>

  <div id="usersList" class="flex-1 overflow-y-auto"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="hidden h-screen flex flex-col">

  <div class="p-4 border-b flex items-center gap-2">
    <button onclick="goBack()">←</button>
    <div id="chatHeader"></div>
  </div>

  <div id="messages" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

  <!-- INPUT -->
  <div class="sticky bottom-0 p-3 bg-black/80">
    <div class="flex gap-2 bg-white/10 rounded-full px-3 py-2">

      <input id="msg" class="flex-1 bg-transparent outline-none text-white">

      <button onclick="sendMessage()" class="bg-blue-500 px-3 py-2 rounded-full">
        ➤
      </button>

    </div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
