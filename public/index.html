<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- LOGIN -->
<div id="login" class="flex flex-col items-center justify-center h-screen gap-3">
  <h2 class="text-xl">Login</h2>

  <input id="email" placeholder="Email" class="p-2 bg-white/10 rounded">
  <input id="password" type="password" placeholder="Password" class="p-2 bg-white/10 rounded">
  <input id="nickname" placeholder="Nickname" class="p-2 bg-white/10 rounded">
  <input type="file" id="avatarInput">

  <button onclick="login()" class="bg-blue-500 px-4 py-2 rounded">Enter</button>
</div>

<!-- USER LIST -->
<div id="chatList" class="hidden p-3">
  <h2 class="text-lg mb-3">Chats</h2>
  <div id="usersList"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="hidden flex flex-col h-screen">
  <div id="chatHeader" class="p-3 border-b"></div>

  <div id="messages" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

  <div class="p-3 flex gap-2">
    <input id="msg" class="flex-1 bg-white/10 p-2 rounded">
    <button onclick="sendMessage()" class="bg-blue-500 px-3 rounded active:scale-90">➤</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
